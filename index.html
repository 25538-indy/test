<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกข้อมูลนักเรียน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
        <h2 class="text-2xl font-bold text-center text-slate-800 mb-6">📝 ฟอร์มเก็บข้อมูลนักเรียน</h2>
        
        <form id="studentForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">คำนำหน้าชื่อ</label>
                <select id="prefix" name="prefix" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">-- เลือกคำนำหน้า --</option>
                    <option value="เด็กชาย">เด็กชาย</option>
                    <option value="เด็กหญิง">เด็กหญิง</option>
                    <option value="นาย">นาย</option>
                    <option value="นางสาว">นางสาว</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">ชื่อ</label>
                    <input type="text" id="firstName" name="firstName" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">นามสกุล</label>
                    <input type="text" id="lastName" name="lastName" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <div class="grid grid-cols-3 gap-2">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">ชั้น ม.</label>
                    <select id="grade" name="grade" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="1">ม.1</option>
                        <option value="2">ม.2</option>
                        <option value="3">ม.3</option>
                        <option value="4">ม.4</option>
                        <option value="5">ม.5</option>
                        <option value="6">ม.6</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">ห้อง</label>
                    <input type="number" id="room" name="room" min="1" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="เช่น 1">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">เลขที่</label>
                    <input type="number" id="number" name="number" min="1" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="เช่น 1">
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-lg transition duration-200 mt-4 shadow-md">
                บันทึกข้อมูล
            </button>
        </form>
    </div>

    <script>
        $(document).ready(function() {
            $('#studentForm').on('submit', function(e) {
                e.preventDefault(); // ป้องกันไม่ให้หน้าเว็บรีเฟรชเมื่อกดส่งฟอร์ม

                // 1. เรียกใช้งาน SweetAlert2 แสดงสถานะกำลังบันทึกข้อมูลและบล็อกการกดซ้ำ
                Swal.fire({
                    title: 'กำลังบันทึกข้อมูล...',
                    text: 'กรุณารอสักครู่ ระบบกำลังส่งข้อมูลไปยัง Google Sheets',
                    allowOutsideClick: false,
                    didOpen: () => {
                        Swal.showLoading(); // แสดงสัญลักษณ์ดาวน์โหลดหมุนๆ
                    }
                });

                // 2. รวบรวมข้อมูลจากฟอร์มเตรียมส่งออกไป
                var formData = {
                    prefix: $('#prefix').val(),
                    firstName: $('#firstName').val(),
                    lastName: $('#lastName').val(),
                    grade: $('#grade').val(),
                    room: $('#room').val(),
                    number: $('#number').val()
                };

                // 🚨 แก้ไขตรงนี้: นำ URL ที่ได้จากขั้นตอนที่ 1 (ข้อ 10) มาวางแทนที่เครื่องหมายคำพูดด้านล่างนี้ 🚨
                var appScriptUrl = "https://script.google.com/macros/s/AKfycbzFH0NpvOSZd4AbUQbj5BmK5RuiPMUsITKgt4SlWbFGWq_AAa4QfDL1BGbQrC3YPhVFVQ/exec";

                // 3. ส่งข้อมูลผ่าน AJAX รูปแบบ JSONP เพื่อข้ามขีดจำกัด Cross-Origin (CORS) บันทึกเข้า Sheet ได้โดยตรง
                $.ajax({
                    url: appScriptUrl,
                    type: "GET",
                    dataType: "jsonp", // บังคับโครงสร้าง JSONP 
                    data: formData,
                    success: function(response) {
                        // เมื่อเซิร์ฟเวอร์ตอบกลับและส่งสถานะมาว่าสำเร็จ
                        if(response.status === "success") {
                            Swal.fire({
                                icon: 'success',
                                title: 'บันทึกสำเร็จ!',
                                text: response.message,
                                confirmButtonText: 'ตกลง'
                            });
                            $('#studentForm')[0].reset(); // รีเซ็ตล้างค่าข้อมูลในฟอร์มหลังจากบันทึกเรียบร้อย
                        } else {
                            // กรณีหลังบ้านของ Apps Script ส่งสถานะ error กลับมา
                            Swal.fire({
                                icon: 'error',
                                title: 'เกิดข้อผิดพลาดจากระบบ',
                                text: response.message
                            });
                        }
                    },
                    error: function(xhr, status, error) {
                        // กรณีเชื่อมต่อเซิร์ฟเวอร์ไม่ได้ หรือใส่ URL ผิดพลาด
                        Swal.fire({
                            icon: 'error',
                            title: 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้',
                            text: 'กรุณาตรวจสอบ URL Web App หรือการเชื่อมต่ออินเทอร์เน็ต'
                        });
                    }
                });
            });
        });
    </script>
</body>
</html>
